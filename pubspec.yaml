name: nexusbrain
description: A personal knowledge management app with graph visualization and semantic search.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Database (Isar NoSQL - community fork)
  isar_community: ^3.3.2
  isar_community_flutter_libs: ^3.3.2

  # SQLite for FTS5
  sqlite3: ^3.3.1
  sqlite3_flutter_libs: ^0.6.0+eol

  path: ^1.9.0
  path_provider: ^2.1.1

  # UI
  flutter_markdown_plus: ^1.0.7
  google_fonts: ^8.1.0
  flutter_staggered_animations: ^1.1.1
  flutter_animate: ^4.3.0
  dynamic_color: ^1.7.0
  desktop_multi_window: ^0.3.0
  syncfusion_flutter_pdfviewer: ^33.2.6

  # File System
  file_picker: ^11.0.0

  # WebDAV Client for Cloud Sync
  webdav_client: ^1.2.0
  # Scripting Engine for Plugins
  flutter_js: ^0.8.0

  # UUID
  uuid: ^4.2.1

  # Crypto (for sync hashing and E2EE)
  crypto: ^3.0.3
  encrypt: ^5.0.3

  # ML / Embeddings
  flutter_onnxruntime: ^1.7.1
  dart_bert_tokenizer: ^1.0.1
  

  # Biometric Auth
  local_auth: ^2.3.0

  # i18n
  easy_localization: ^3.0.3

  # Persistence
  shared_preferences: ^2.2.2

  # Mobile Optimization
  share_plus: ^12.0.2
  receive_sharing_intent: ^1.8.1
  home_widget: ^0.9.1

dev_dependencies:
  isar_community_generator: ^3.3.2
  riverpod_generator: ^4.0.3
  riverpod_lint: ^3.1.3
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: any
  mocktail: ^1.0.3
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.0
  msix: ^3.16.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/nexusbrain.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/nexusbrain.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"
  windows:
    generate: true
    image_path: "assets/images/nexusbrain.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "assets/images/nexusbrain.png"

msix_config:
  display_name: NexusBrain
  publisher_display_name: NexusBrain
  identity_name: com.nexusbrain.app
  publisher: CN=NexusBrain
  logo_path: assets/images/nexusbrain.png
  capabilities: internetClient, location, microphone, webcam

flutter_native_splash:
  color: "#ffffff"
  image: assets/images/nexusbrain.png
  android: true
  ios: true
  web: true

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/translations/
    - assets/ai/
