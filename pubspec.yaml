name: nexusbrain
description: A personal knowledge management app with graph visualization and semantic search.
publish_to: 'none'
version: 0.2.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9

  # Database (drift = web + mobile + desktop)
  drift: ^2.33.0
  drift_flutter: ^0.3.0
  
  # For drift native support
  sqlite3_flutter_libs: ^0.6.0
  path: ^1.9.0

  # Code Generation
  json_annotation: ^4.9.0

  # UI
  flutter_markdown: ^0.6.18
  google_fonts: ^6.1.0
  flutter_staggered_animations: ^1.1.1
  flutter_animate: ^4.3.0

  # File System
  file_picker: ^6.1.1
  path_provider: ^2.1.1

  # UUID
  uuid: ^4.2.1

  # Crypto (for sync hashing)
  crypto: ^3.0.3

  # i18n
  easy_localization: ^3.0.3

  # Persistence
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

  # Code Generation
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  drift_dev: ^2.33.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/translations/
